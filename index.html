<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visitor Management System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Mukta:wght@700&family=Noto+Sans+Devanagari:wght@400;700&family=Noto+Sans:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="/index.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        // Dynamic Primary Color Scale
                        primary: {
                            50: 'var(--primary-50)',
                            100: 'var(--primary-100)',
                            200: 'var(--primary-200)',
                            300: 'var(--primary-300)',
                            400: 'var(--primary-400)',
                            500: 'var(--primary-500)',
                            600: 'var(--primary-600)',
                            DEFAULT: 'var(--primary-600)', // Default for bg-primary, text-primary
                            700: 'var(--primary-700)',
                            800: 'var(--primary-800)',
                            900: 'var(--primary-900)',
                            950: 'var(--primary-950)',
                        },
                        // Secondary Brand Color
                        secondary: 'var(--secondary-brand)',
                        
                        // Neutral Scales (Static)
                        'neutral-50': '#F5F7FA',
                        'neutral-100': '#EBEFF4',
                        'neutral-200': '#D6DEE8',
                        'neutral-300': '#BCC8D8',
                        'neutral-400': '#A1B1C7',
                        'neutral-500': '#879AB5',
                        'neutral-600': '#6D82A2',
                        'neutral-700': '#536A8E',
                        'neutral-800': '#3A517A',
                        'neutral-900': '#213865',
                        'neutral-950': '#112143'
                    },
                    fontFamily: {
                        heading: ['Mukta', 'sans-serif'],
                        body: ['Noto Sans', 'Noto Sans Devanagari', 'sans-serif'],
                        mono: ['Roboto Mono', 'monospace'],
                    },
                },
            },
        };
    </script>
</head>
<body class="bg-neutral-50 dark:bg-neutral-950 text-neutral-900 dark:text-neutral-100 font-body antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
